<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody id="userTable">

        </tbody>
    </table>

    <script>
        let users=JSON.parse(localStorage.getItem('users')) || [];
        let tableBody=document.getElementById('userTable');
        users.forEach(user=>{
            let row=`
            <tr>
                <td>${user.username}</td>
                <td>${user.email}</td>
                <td>${user.address}</td>
            </tr>
            `;
            tableBody.innerHTML+=row;
        });
    </script>
</body>
</html>
