<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}

.sidebar{
    height:100vh;
    background:#0d6efd;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
}

.sidebar a:hover{
    background:white;
    color:#0d6efd;
}

.card{
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar text-white">
        <h3 class="text-center">ADMIN</h3>

        <a href="#">Dashboard</a>
        <a href="#">Students</a>
        <a href="#">Faculty</a>
        <a href="#">Courses</a>
        <a href="#">Exams</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <h2>College Admin Dashboard</h2>

        <!-- Cards -->
        <div class="row g-3 mt-2">

            <div class="col-md-3">
                <div class="card bg-primary text-white p-3 text-center">
                    <h3>1200</h3>
                    <p>Total Students</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-success text-white p-3 text-center">
                    <h3>85</h3>
                    <p>Faculty</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-warning p-3 text-center">
                    <h3>12</h3>
                    <p>Departments</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-danger text-white p-3 text-center">
                    <h3>350</h3>
                    <p>Results</p>
                </div>
            </div>

        </div>

        <!-- Table -->
        <div class="mt-5">

            <h4>Student Details</h4>

            <table class="table table-bordered table-striped bg-white">

                <tr class="table-dark">
                    <th>ID</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>101</td>
                    <td>Rahul Sharma</td>
                    <td>IT</td>
                    <td>Active</td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Priya Patil</td>
                    <td>Computer</td>
                    <td>Pending</td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Amit Kumar</td>
                    <td>ENTC</td>
                    <td>Active</td>
                </tr>

            </table>

        </div>

    </div>

</div>
</div>

</body>
</html>
